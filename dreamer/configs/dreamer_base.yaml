# DreamerV3 base configuration — shared defaults for all obs modes.
# Scaled for 24 GB VRAM (e.g. RTX 3090/4090).  Override per obs mode in dreamer_rgb/mask/rgb_mask.yaml.

obs_mode: rgb
image_channels: 3       # overridden per yaml
state_dim: 10           # ang_vel(3) + quat(4) + target_pos_b(3)
action_dim: 4

# RSSM
h_dim: 512              # recurrent state dim (paper: 2048)
z_cats: 32              # number of categorical variables
z_classes: 32           # classes per variable  → latent = h_dim + z_cats*z_classes = 1536
mlp_dim: 256            # hidden dim for all MLPs (paper: 768)
cnn_depth: 32           # base CNN channel count

# World model loss coefficients
beta_pred: 1.0
beta_dyn: 0.5     # paper value; 1.0 caused KL spikes up to 29 nats and training instability
beta_rep: 0.1

# Actor-critic
horizon: 15             # imagination rollout length
gamma: 0.997
lam: 0.95
entropy_scale: 3.0e-4
target_critic_ema: 0.98

# Training
seq_len: 16             # sequence length per replay sample
batch_size: 32          # number of sequences per gradient step (was 16 for 6 GB)
lr_world: 1.0e-4
lr_actor: 3.0e-5
lr_critic: 3.0e-5
grad_clip: 100.0
warmup_steps: 1000      # random action warmup before learning starts
update_every: 1         # env steps between gradient update cycles
n_grad_steps: 2         # gradient updates per cycle (was 1 for 6 GB)

# Replay buffer
replay_capacity: 500000

# Logging / checkpointing (counted in gradient updates, not env steps)
log_interval: 50      # log every 50 gradient updates
save_interval: 200    # checkpoint every 200 gradient updates
