# DreamerV3 base configuration — shared defaults for all obs modes.
# Scaled for 24 GB VRAM (RTX 4090).  Override per obs mode in dreamer_rgb/mask/rgb_mask.yaml.

obs_mode: rgb
image_channels: 3       # overridden per yaml
state_dim: 13           # ang_vel(3) + quat(4) + lin_vel(3) + target_pos_b(3)
action_dim: 4

# RSSM — full paper spec (paper: h_dim=2048, mlp_dim=768, cnn_depth=48)
h_dim: 2048             # recurrent state dim
z_cats: 32              # number of categorical variables
z_classes: 32           # classes per variable  → latent = h_dim + z_cats*z_classes = 3072
mlp_dim: 768            # hidden dim for all MLPs
cnn_depth: 48           # base CNN channel count

# World model loss coefficients
# free_bits=1.0: KL floor per category (nats). Both NM512 and danijar use 1.0.
# Prevents posterior collapse by forcing z to encode at least 1 nat from observations.
beta_pred: 3.0
beta_dyn: 0.5   # 1.0 caused posterior collapse via KL spike at 358K; 0.5 stable
beta_rep: 0.1
free_bits: 1.0  # KL floor — main defence against posterior collapse

# Actor-critic
horizon: 15             # imagination rollout length
# gamma derived from horizon: gamma = 1 - 1/horizon (≈ 0.997 for horizon=333)
lam: 0.95
entropy_scale: 3.0e-3   # 10x paper value: training showed policy collapse at 3e-4; 3e-3 keeps H[π] positive
entropy_min: 1.0        # floor: penalty kicks in if entropy drops below this (nats); prevents policy collapse
target_critic_ema: 0.98

# Training
seq_len: 64             # sequence length per replay sample — paper value
batch_size: 16          # paper + both reference implementations use 16
lr_world: 1.0e-4
lr_actor: 3.0e-5
lr_critic: 3.0e-5
grad_clip: 100.0
warmup_steps: 2000      # random action warmup before learning starts
update_every: 1         # env steps between gradient update cycles
n_grad_steps: 4         # gradient updates per cycle

# Replay buffer
replay_capacity: 2000000

# Speed
compile: true         # torch.compile networks (reduce-overhead mode)
amp_dtype: bfloat16   # bfloat16 recommended for RTX 4090; fall back to float16 if issues

# Logging / checkpointing (counted in gradient updates, not env steps)
log_interval: 50      # log every 50 gradient updates
save_interval: 200    # checkpoint every 200 gradient updates
