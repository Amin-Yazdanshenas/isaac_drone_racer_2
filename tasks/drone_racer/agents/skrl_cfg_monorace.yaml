seed: 1


# Asymmetric AC: policy reads OBSERVATIONS (26-dim compact state), value reads STATES (20-dim GT)
# MonoRaceRunner overrides model instantiation — the network spec below sets hyperparams only.
models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    # Architecture spec is ignored — MonoRaceRunner creates MonoRacePolicy directly
    network:
      - name: net
        input: OBSERVATIONS
        layers: [128, 128, 128]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: STATES
        layers: [256, 256, 256]
        activations: elu
    output: ONE


# Rollout memory
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration
agent:
  class: PPO
  rollouts: 64
  learning_epochs: 5
  mini_batches: 8
  discount_factor: 0.99
  gae_lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  # RunningStandardScaler is correct here — compact continuous state benefits from normalization
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  entropy_loss_scale: 0.005
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.6
  time_limit_bootstrap: False
  experiment:
    directory: "drone_racer_monorace"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
trainer:
  class: SequentialTrainer
  timesteps: 300000
  environment_info: log
