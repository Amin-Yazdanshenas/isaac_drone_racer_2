seed: 1


# Swarm PPO — RTX 3060 / 6 GB-friendly preset. Smaller MLP + smaller rollout
# buffer than skrl_cfg_swarm.yaml. Pair with --num_envs 64 --num_drones 2.
models:
  separate: False
  policy:
    class: GaussianMixin
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: OBSERVATIONS
        layers: [256, 256]
        activations: elu
    output: ONE


memory:
  class: RandomMemory
  memory_size: -1


agent:
  class: PPO
  rollouts: 16
  learning_epochs: 4
  mini_batches: 4
  discount_factor: 0.99
  gae_lambda: 0.95
  learning_rate: 1.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  entropy_loss_scale: 0.005
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.6
  time_limit_bootstrap: False
  experiment:
    directory: "drone_racer_swarm_lite"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


trainer:
  class: SequentialTrainer
  timesteps: 60000
  environment_info: log
